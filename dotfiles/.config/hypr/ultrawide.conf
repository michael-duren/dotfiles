# Ultrawide single-window centering
#
# When the ultrawide has exactly one tiled visible window on a workspace,
# add large left/right gapsout so the window is centered at ~60% width.
# With 2+ tiled windows the rule does not apply, so normal tiling fills the screen.
#
# Math: 3440 * 0.60 = 2064 usable -> (3440 - 2064) / 2 = 688 px per side.
# Top/bottom keep the global gaps_out (5 px from theme.conf).
#
# Monitor matched by description so it survives DP port renumbering.
# To find your monitor description: hyprctl monitors | grep description

# vars
$ultramon = desc:Samsung Electric Company LS34A650U HCNY505479
$mx_lg = 688
$mx_md = 400
$mx_sm = 200
$my_xs = 5

workspace = m[$ultramon] w[tv1], gapsout:$my_xs $mx_lg $my_xs $mx_lg
workspace = m[$ultramon] w[tv2], gapsout:$my_xs $mx_md $my_xs $mx_md
workspace = m[$ultramon] w[tv3+], gapsout:$my_xs $mx_sm $my_xs $mx_sm
