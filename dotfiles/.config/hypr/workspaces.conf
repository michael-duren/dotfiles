# █░█░█ █▀█ █▀█ █▄▀ █▀ █▀█ ▄▀█ █▀▀ █▀▀ █▀
# ▀▄▀▄▀ █▄█ █▀▄ █░█ ▄█ █▀▀ █▀█ █▄▄ ██▄ ▄█
#
# Workspaces are pinned by monitor description so they always live on the
# correct physical display regardless of DP port renumbering.
#
# Layout:
#   1–9  → Samsung ultrawide  (primary work area when docked)
#   10   → Framework laptop   (music player / aux content)
#
# When the ultrawide is unplugged, Hyprland automatically reassigns its
# workspaces to whatever monitor remains, so the laptop alone "just works".

$ultrawide = desc:Samsung Electric Company LS34A650U HCNY505479
$laptop    = desc:BOE NE160QDM-NZ6

workspace = 1,  monitor:$ultrawide, default:true, persistent:true
workspace = 2,  monitor:$ultrawide, persistent:true
workspace = 3,  monitor:$ultrawide
workspace = 4,  monitor:$ultrawide
workspace = 5,  monitor:$ultrawide
workspace = 6,  monitor:$ultrawide
workspace = 7,  monitor:$ultrawide
workspace = 8,  monitor:$ultrawide
workspace = 9,  monitor:$ultrawide

# Laptop's dedicated workspace — focus jumps here on first window spawn.
workspace = 10, monitor:$laptop, default:true, persistent:true
