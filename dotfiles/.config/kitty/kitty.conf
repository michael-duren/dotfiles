include hyde.conf

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd
# Ctrl+Shift+L: clear the terminal.
# Outside tmux: kitty's clear_terminal handles it directly.
# Inside tmux: kitty also injects a unique escape sequence (\e[42~) which tmux
# binds (via user-keys) to send C-l + clear-history. Using a custom sequence
# avoids the kitty<->tmux extended-keys protocol negotiation, which doesn't
# reliably disambiguate Ctrl+Shift+<letter> from Ctrl+<letter>.
map ctrl+shift+l combine : clear_terminal scroll active : send_text all \x1b[42~

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no
